<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Свадьба Сергея и Ксении</title>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Исправление скролла */
        html {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background-color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
            color: #1a1a1a;
            width: 100%;
            min-height: 100%;           /* обеспечивает корректную высоту */
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background-color: #FFFFFF;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимация появления — БЕЗ will-change и с видимостью по умолчанию */
        .fade-section {
            opacity: 1;                  /* чтобы не было «схлопывания» высоты */
            transform: translateY(0);
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Начальное скрытие будет добавлено через JS для элементов вне зоны видимости */
        .fade-section:not(.visible) {
            opacity: 0;
            transform: translateY(20px);
        }

        .photo-wrapper {
            opacity: 1;
            transform: scale(1);
            transition: opacity 1s ease, transform 1s ease;
        }

        .photo-wrapper:not(.visible) {
            opacity: 0;
            transform: scale(0.96);
        }

        /* ---------- БЛОК 1 (Приветствие) ---------- */
        .block-1 {
            padding: 40px 20px 60px;
            text-align: center;
            background-color: #FFFFFF;
        }

        .date-top { font-size: 18px; letter-spacing: 2px; margin-bottom: 25px; color: #333; }
        .photo-wrapper { width: 100%; margin-bottom: 40px; }
        .couple-photo { width: 100%; display: block; filter: grayscale(100%); border-radius: 0; }

        .names-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .line { display: flex; align-items: baseline; gap: 10px; }
        .name { font-family: 'Playfair Display', serif; font-size: clamp(24px, 7vw, 32px); text-transform: uppercase; letter-spacing: 2px; }
        .script-text { font-family: 'Great Vibes', cursive; font-size: clamp(32px, 10vw, 45px); color: #555; }

        .player-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .audio-btn { width: 50px; height: 50px; border: 1px solid #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; transition: background 0.2s; }
        .audio-btn:hover { background-color: #f5f5f5; }
        .audio-btn svg { width: 20px; height: 20px; fill: #1a1a1a; }
        .player-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; }

        /* ---------- БЛОК 2 (Дата и Сердце) ---------- */
        .block-2 {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
        }
        .title-2 { font-family: 'Playfair Display', serif; font-size: 26px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        .description { font-weight: 300; font-size: 15px; line-height: 1.8; margin-bottom: 60px; color: #ccc; }
        .calendar-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.15); border-bottom: 1px solid rgba(255,255,255,0.15); margin: 0 -20px; }
        .grid-item { padding: 30px 5px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255,255,255,0.15); }
        .grid-item:last-child { border-right: none; }
        .day-val { font-family: 'Playfair Display', serif; font-size: 50px; }
        .m-text { font-size: 13px; text-transform: uppercase; margin-bottom: 5px; }
        .y-text { font-family: 'Playfair Display', serif; font-size: 20px; }
        .heart-icon { width: 35px; height: 35px; fill: white; }

        /* ---------- БЛОК 3 (Локация) ---------- */
        .block-3 {
            background-color: #FFFFFF;
            padding: 60px 0 0 0;
            text-align: center;
        }
        .location-info { padding: 0 20px 40px; }
        .city-name { font-size: 18px; margin-bottom: 5px; color: #333; }
        .venue-address { font-weight: 300; font-size: 16px; color: #666; margin-bottom: 25px; line-height: 1.5; }
        
        .map-button {
            display: inline-block;
            background-color: #1a1a1a;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            text-transform: lowercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
            border: none;
            cursor: pointer;
        }
        .map-button:hover { opacity: 0.8; }
        
        .venue-photo-wrapper {
            width: 100%;
            margin-top: 40px;
            line-height: 0;
        }
        .venue-photo { width: 100%; height: auto; display: block; }

        /* ---------- БЛОК 4 (Программа дня) ---------- */
        .section-program {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background-color: #FFFFFF;
            padding: 60px 0 0 0;
            text-align: center;
            position: relative;
        }

        .program-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 50px;
            color: #1a1a1a;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 60px;
        }

        .event {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .time {
            font-size: 14px;
            font-weight: 400;
            color: #666;
        }

        .event-name {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #1a1a1a;
        }

        .timeline-line {
            width: 1px;
            height: 40px;
            background-color: #ccc;
            margin: 5px 0;
        }

        /* ---------- БЕГУЩАЯ СТРОКА ---------- */
        .marquee-container {
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 15px 0;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
        }

        .marquee-wrapper {
            display: flex;
            animation: scroll 20s linear infinite;
        }

        .marquee-item {
            flex-shrink: 0;
            padding: 0 20px;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ---------- БЛОК 5: ДРЕСС-КОД ---------- */
        .dresscode-details {
            background-color: #FFFFFF;
            padding: 50px 20px 60px;
            text-align: center;
        }

        .dresscode-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .dresscode-subtitle {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #666;
            margin-bottom: 35px;
        }

        .dresscode-description {
            font-weight: 300;
            font-size: 15px;
            line-height: 1.7;
            color: #555;
            max-width: 380px;
            margin: 0 auto 45px;
        }

        .dresscode-note {
            margin-top: 40px;
            font-style: italic;
            font-size: 13px;
            color: #888;
            border-top: 1px dashed #ddd;
            padding-top: 30px;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ---------- БЛОК 6: АНКЕТА ГОСТЯ ---------- */
        .rsvp-section {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 60px 25px 70px;
            box-sizing: border-box;
            background-color: #FFFFFF;
        }

        .rsvp-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .rsvp-deadline {
            text-align: center;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 35px;
        }

        label.main-label {
            display: block;
            font-size: 15px;
            margin-bottom: 15px;
            font-weight: 400;
            color: #1a1a1a;
        }

        input[type="text"], textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #1a1a1a;
            background: transparent;
            padding: 10px 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            outline: none;
            color: #1a1a1a;
        }

        ::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        .option-container {
            display: block;
            position: relative;
            padding-left: 35px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 15px;
            user-select: none;
            font-weight: 300;
            color: #1a1a1a;
        }

        .option-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 20px;
            width: 20px;
            background-color: transparent;
            border: 1px solid #1a1a1a;
            transition: background 0.1s;
        }

        .radio .checkmark {
            border-radius: 50%;
        }

        .option-container input:checked ~ .checkmark {
            background-color: #1a1a1a;
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 250px;
            margin: 50px auto 0;
            background-color: #1a1a1a;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 14px;
            text-transform: lowercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .submit-btn:hover {
            opacity: 0.8;
        }

        /* ---------- БЛОК 7: ТАЙМЕР ОБРАТНОГО ОТСЧЁТА ---------- */
        .countdown-section {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 60px 20px 70px;
            text-align: center;
        }

        .countdown-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .countdown-subtitle {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .countdown-photo {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            margin: 0 auto 35px;
            display: block;
            border: 2px solid rgba(255,255,255,0.2);
            filter: grayscale(100%);
        }

        .timer-grid {
            display: flex;
            justify-content: center;
            gap: 15px 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .timer-item {
            min-width: 60px;
        }

        .timer-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 400;
            line-height: 1;
        }

        .timer-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-top: 8px;
        }

        .countdown-message {
            font-weight: 300;
            font-size: 16px;
            color: #ddd;
            max-width: 300px;
            margin: 0 auto;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
        }

        .spacer {
            height: 10px;
            background: transparent;
        }
    </style>
</head>
<body>

    <!-- ... содержимое body остаётся без изменений ... -->

    <audio id="bgMusic" loop>
        <source src="музыка.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        
        <!-- БЛОК 1 -->
        <section class="block-1 fade-section" id="section1">
            <!-- ... -->
        </section>

        <!-- Все остальные блоки идентичны предыдущей версии -->
        <!-- ... -->

    </div>

    <script>
        (function() {
            // --- Управление музыкой ---
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            const playIco = document.getElementById('playIcon');
            const pauseIco = document.getElementById('pauseIcon');
            const label = document.querySelector('.player-label');

            if (music && btn && playIco && pauseIco && label) {
                btn.addEventListener('click', () => {
                    if (music.paused) {
                        music.play().then(() => {
                            playIco.style.display = 'none';
                            pauseIco.style.display = 'block';
                            label.textContent = 'Pause Music';
                        }).catch(e => {
                            console.warn('Автовоспроизведение заблокировано.');
                            playIco.style.display = 'none';
                            pauseIco.style.display = 'block';
                            label.textContent = 'Pause Music';
                        });
                    } else {
                        music.pause();
                        playIco.style.display = 'block';
                        pauseIco.style.display = 'none';
                        label.textContent = 'Play Music';
                    }
                });
            }

            // --- АНИМАЦИЯ ПОЯВЛЕНИЯ ПРИ СКРОЛЛЕ ---
            const sections = document.querySelectorAll('.fade-section');
            const photoWrapper = document.getElementById('mainPhotoWrapper');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        if (entry.target.id === 'section1' && photoWrapper) {
                            photoWrapper.classList.add('visible');
                        }
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -20px 0px' });

            sections.forEach(section => observer.observe(section));
            if (photoWrapper) observer.observe(photoWrapper);

            // Принудительно показываем всё, что видно при загрузке
            function checkVisibility() {
                sections.forEach(section => {
                    const rect = section.getBoundingClientRect();
                    if (rect.top < window.innerHeight * 0.85) {
                        section.classList.add('visible');
                        if (section.id === 'section1' && photoWrapper) {
                            photoWrapper.classList.add('visible');
                        }
                    }
                });
                if (photoWrapper) {
                    const rect = photoWrapper.getBoundingClientRect();
                    if (rect.top < window.innerHeight * 0.85) photoWrapper.classList.add('visible');
                }
            }

            window.addEventListener('load', () => {
                checkVisibility();
                // Небольшая задержка для пересчёта макета (помогает скроллу)
                setTimeout(() => {
                    document.body.style.minHeight = '101%';
                    document.body.style.minHeight = '100%';
                }, 100);
            });

            // Также запускаем после изменения размера
            window.addEventListener('resize', checkVisibility);

            // --- ТАЙМЕР ОБРАТНОГО ОТСЧЁТА (ДАТА 24.07.2026) ---
            const weddingDate = new Date(2026, 6, 24, 15, 0, 0).getTime();

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');

            function updateTimer() {
                const now = new Date().getTime();
                const distance = weddingDate - now;

                if (distance < 0) {
                    if (daysEl) daysEl.innerText = '00';
                    if (hoursEl) hoursEl.innerText = '00';
                    if (minutesEl) minutesEl.innerText = '00';
                    if (secondsEl) secondsEl.innerText = '00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                if (daysEl) daysEl.innerText = days < 10 ? '0' + days : days;
                if (hoursEl) hoursEl.innerText = hours < 10 ? '0' + hours : hours;
                if (minutesEl) minutesEl.innerText = minutes < 10 ? '0' + minutes : minutes;
                if (secondsEl) secondsEl.innerText = seconds < 10 ? '0' + seconds : seconds;
            }

            updateTimer();
            const timerInterval = setInterval(updateTimer, 1000);
            window.addEventListener('beforeunload', () => clearInterval(timerInterval));

            // --- ОБРАБОТКА АНКЕТЫ ---
            const form = document.getElementById('rsvpForm');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    alert('Спасибо! Ваша анкета отправлена. (Демо-режим)');
                });
            }
        })();
    </script>
</body>
</html>
