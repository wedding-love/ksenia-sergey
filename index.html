<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свадьба Сергея и Ксении</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    -webkit-text-size-adjust: 100%;
    scroll-behavior: smooth;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #fff;
    overflow-x: hidden;
}

/* контейнер */
.container {
    max-width: 450px;
    margin: auto;
}

/* АНИМАЦИЯ */
.fade-section {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
    will-change: opacity, transform;
}

.fade-section.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ❗ УБИРАЕМ БАГ У ПЕРВОГО ЭКРАНА */
#section1 {
    opacity: 1 !important;
    transform: none !important;
}

/* ---------- БЛОК 1 ---------- */
.block-1 {
    padding: 40px 20px 60px;
    text-align: center;
}

.date-top {
    margin-bottom: 25px;
}

.couple-photo {
    width: 100%;
    margin-bottom: 40px;
    filter: grayscale(100%);
}

.name {
    font-family: 'Playfair Display';
    font-size: 28px;
}

.script-text {
    font-family: 'Great Vibes';
    font-size: 40px;
}

/* ---------- БЛОК 2 ---------- */
.block-2 {
    background: #1a1a1a;
    color: #fff;
    padding: 80px 20px;
    text-align: center;
}

/* ---------- БЛОК 3 ---------- */
.block-3 {
    padding: 60px 20px;
    text-align: center;
}

/* ---------- КНОПКА ---------- */
.map-button {
    display: inline-block;
    background: #000;
    color: #fff;
    padding: 12px 30px;
    border-radius: 30px;
    margin-top: 20px;
    text-decoration: none;
}

/* ---------- ПРОГРАММА ---------- */
.section-program {
    padding: 60px 20px;
    text-align: center;
}

.timeline {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* ---------- ТАЙМЕР ---------- */
.countdown-section {
    background: #1a1a1a;
    color: #fff;
    padding: 60px 20px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<section class="block-1 fade-section" id="section1">
    <div class="date-top">24.07.2026</div>
    <img src="молодожены.jpg" class="couple-photo">
    <div class="name">СЕРГЕЙ</div>
    <div class="script-text">and</div>
    <div class="name">КСЕНИЯ</div>
</section>

<section class="block-2 fade-section">
    <h2>Дорогие гости</h2>
    <p>Мы будем рады видеть вас на нашей свадьбе</p>
</section>

<section class="block-3 fade-section">
    <h3>Локация</h3>
    <p>г. Оса</p>
    <a href="#" class="map-button">открыть карту</a>
</section>

<section class="section-program fade-section">
    <h2>Программа</h2>
    <div class="timeline">
        <div>16:00 — Сбор гостей</div>
        <div>16:30 — Регистрация</div>
        <div>17:00 — Банкет</div>
    </div>
</section>

<section class="countdown-section fade-section">
    <h2>До встречи</h2>
    <div id="timer">...</div>
</section>

</div>

<script>
/* ✅ ПЛАВНОЕ ПОЯВЛЕНИЕ */
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, {
    threshold: 0.1
});

document.querySelectorAll('.fade-section').forEach(el => {
    observer.observe(el);
});

/* ❗ сразу показываем первый экран */
document.getElementById('section1').classList.add('visible');


/* ТАЙМЕР */
const weddingDate = new Date(2026, 6, 24).getTime();
const timer = document.getElementById('timer');

function updateTimer() {
    const now = Date.now();
    const diff = weddingDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    timer.innerHTML = days + " дней";
}

setInterval(updateTimer, 1000);
</script>

</body>
</html>
